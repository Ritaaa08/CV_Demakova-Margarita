<!DOCTYPE html>

<!--JavaScript pour les transitions entre les pages-->
  <script>
  document.querySelectorAll('a').forEach(link => {
    const href = link.getAttribute('href');
    if (href && !href.startsWith('#') && !href.startsWith('mailto:') && !href.startsWith('tel:')) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        document.body.classList.add('fade-out');
        setTimeout(() => {
          window.location.href = href;
        }, 400); // correspond à la durée de l'animation
      });
    }
  });
</script>


<body class="certificats-page">

   <!-- SECTION HERO -->
  <header >

      <img src="/LOGO.png" alt="Logo" class="logo">

        <li><a href="index.html#competences">COMPÉTENCES</a></li>
        <li><a href="index.html#contacts">CONTACTS</a></li>
      </ul>
    </nav>

  <!-- Contenu principal -->

    <img src="/Certificat_C.png" alt="Certificat C" class="certificat-image">
  </main>

</body>
</html>
